name: iOS Cloud Build And Screenshots

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - ios
    paths:
      - 'ios/mZUTiOS/**'
      - '.github/workflows/ios-cloud-build.yml'
      - '!ios/mZUTiOS/screenshots/**'
      - '!ios/mZUTiOS/ci-logs/**'

permissions:
  contents: write

jobs:
  build-and-capture:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: ios/mZUTiOS
        run: xcodegen generate

      - name: Show toolchain versions
        run: |
          xcodebuild -version
          xcrun simctl list runtimes

      - name: Resolve simulator
        id: simulator
        run: |
          set -euo pipefail
          SIM_UDID=$(xcrun simctl list devices available | grep -m1 "iPhone" | awk -F '[()]' '{print $2}')
          SIM_UDID=$(echo "$SIM_UDID" | tr -d '[:space:]')
          if [ -z "$SIM_UDID" ]; then
            echo "No available iPhone simulator found" >&2
            exit 1
          fi
          echo "udid=$SIM_UDID" >> "$GITHUB_OUTPUT"

      - name: Build app
        working-directory: ios/mZUTiOS
        run: |
          set -euo pipefail
          mkdir -p build
          set -o pipefail
          xcodebuild \
            -project mZUTiOS.xcodeproj \
            -scheme mZUTiOSApp \
            -configuration Debug \
            -destination "id=${{ steps.simulator.outputs.udid }}" \
            -derivedDataPath build/DerivedData \
            build 2>&1 | tee build/xcodebuild-build.log

      - name: Run unit tests
        working-directory: ios/mZUTiOS
        run: |
          set -euo pipefail
          mkdir -p build
          set -o pipefail
          xcodebuild \
            -project mZUTiOS.xcodeproj \
            -scheme mZUTiOSApp \
            -destination "id=${{ steps.simulator.outputs.udid }}" \
            -derivedDataPath build/DerivedData \
            test 2>&1 | tee build/xcodebuild-test.log

      - name: Capture login and home screenshots
        working-directory: ios/mZUTiOS
        run: |
          set -euo pipefail
          SIM_UDID="${{ steps.simulator.outputs.udid }}"
          APP_BUNDLE_ID="pl.kejlo.mzut.ios"
          APP_PATH="build/DerivedData/Build/Products/Debug-iphonesimulator/mZUTiOSApp.app"
          SCREENSHOT_LOG="build/xcodebuild-screenshot.log"

          if [ ! -d "$APP_PATH" ]; then
            echo "Built app not found at: $APP_PATH" >&2
            exit 1
          fi

          mkdir -p build
          : > "$SCREENSHOT_LOG"
          xcrun simctl shutdown "$SIM_UDID" || true
          xcrun simctl erase "$SIM_UDID"
          xcrun simctl boot "$SIM_UDID"
          xcrun simctl bootstatus "$SIM_UDID" -b

          xcrun simctl install "$SIM_UDID" "$APP_PATH"

          mkdir -p build/screenshots

          {
            if ! xcrun simctl launch --terminate-running-process "$SIM_UDID" "$APP_BUNDLE_ID"; then
              echo "First app launch failed, capturing simulator state anyway"
            fi
            sleep 5
            xcrun simctl io "$SIM_UDID" screenshot "build/screenshots/01-login.png"

            if ! xcrun simctl launch --terminate-running-process "$SIM_UDID" "$APP_BUNDLE_ID" --args --screenshot-home; then
              echo "Second app launch with screenshot args failed, capturing simulator state anyway"
            fi
            sleep 5
            xcrun simctl io "$SIM_UDID" screenshot "build/screenshots/02-home.png"

            xcrun simctl terminate "$SIM_UDID" "$APP_BUNDLE_ID" || true
          } 2>&1 | tee -a "$SCREENSHOT_LOG"

      - name: Store screenshots in repo
        if: always()
        run: |
          set -euo pipefail
          mkdir -p ios/mZUTiOS/screenshots
          if ls ios/mZUTiOS/build/screenshots/*.png >/dev/null 2>&1; then
            cp ios/mZUTiOS/build/screenshots/*.png ios/mZUTiOS/screenshots/
          fi

      - name: Store build logs in repo
        if: always()
        run: |
          set -euo pipefail
          mkdir -p ios/mZUTiOS/ci-logs
          if [ -f ios/mZUTiOS/build/xcodebuild-build.log ]; then
            cp ios/mZUTiOS/build/xcodebuild-build.log ios/mZUTiOS/ci-logs/latest-build.log
          fi
          if [ -f ios/mZUTiOS/build/xcodebuild-test.log ]; then
            cp ios/mZUTiOS/build/xcodebuild-test.log ios/mZUTiOS/ci-logs/latest-test.log
          fi
          if [ -f ios/mZUTiOS/build/xcodebuild-screenshot.log ]; then
            cp ios/mZUTiOS/build/xcodebuild-screenshot.log ios/mZUTiOS/ci-logs/latest-screenshot.log
          fi

      - name: Upload screenshots artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-screenshots
          path: ios/mZUTiOS/screenshots/*.png

      - name: Upload xcodebuild logs artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-logs
          path: ios/mZUTiOS/build/*.log

      - name: Commit screenshots
        if: always()
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A ios/mZUTiOS/screenshots ios/mZUTiOS/ci-logs
          if git diff --cached --quiet; then
            echo "No screenshot or log changes to commit"
            exit 0
          fi
          git commit -m "ci: refresh iOS screenshots and logs"
          git push
