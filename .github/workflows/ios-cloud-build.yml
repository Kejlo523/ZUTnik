name: iOS Cloud Build And Screenshots

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - ios
    paths:
      - 'ios/mZUTiOS/**'
      - '.github/workflows/ios-cloud-build.yml'
      - '!ios/mZUTiOS/screenshots/**'

permissions:
  contents: write

jobs:
  build-and-capture:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: ios/mZUTiOS
        run: xcodegen generate

      - name: Show toolchain versions
        run: |
          xcodebuild -version
          xcrun simctl list runtimes

      - name: Resolve simulator
        id: simulator
        run: |
          set -euo pipefail
          SIM_UDID=$(
            python3 - <<'PY'
import json
import subprocess
import sys

raw = subprocess.check_output(
    ["xcrun", "simctl", "list", "devices", "available", "--json"],
    text=True,
)
payload = json.loads(raw)

for runtime_name, devices in payload.get("devices", {}).items():
    if "iOS" not in runtime_name:
        continue
    for device in devices:
        if not device.get("isAvailable"):
            continue
        name = device.get("name", "")
        if name.startswith("iPhone"):
            print(device.get("udid", ""))
            sys.exit(0)

sys.exit(1)
PY
          )
          if [ -z "$SIM_UDID" ]; then
            echo "No available iPhone simulator found" >&2
            exit 1
          fi
          echo "udid=$SIM_UDID" >> "$GITHUB_OUTPUT"

      - name: Build app
        working-directory: ios/mZUTiOS
        run: |
          set -euo pipefail
          mkdir -p build
          set -o pipefail
          xcodebuild \
            -project mZUTiOS.xcodeproj \
            -scheme mZUTiOSApp \
            -configuration Debug \
            -destination "id=${{ steps.simulator.outputs.udid }}" \
            -derivedDataPath build/DerivedData \
            build 2>&1 | tee build/xcodebuild-build.log

      - name: Run unit tests
        working-directory: ios/mZUTiOS
        run: |
          set -euo pipefail
          mkdir -p build
          set -o pipefail
          xcodebuild \
            -project mZUTiOS.xcodeproj \
            -scheme mZUTiOSApp \
            -destination "id=${{ steps.simulator.outputs.udid }}" \
            -derivedDataPath build/DerivedData \
            test 2>&1 | tee build/xcodebuild-test.log

      - name: Capture login and home screenshots
        working-directory: ios/mZUTiOS
        run: |
          set -euo pipefail
          SIM_UDID="${{ steps.simulator.outputs.udid }}"
          APP_BUNDLE_ID="pl.kejlo.mzut.ios"
          APP_PATH="build/DerivedData/Build/Products/Debug-iphonesimulator/mZUTiOSApp.app"

          if [ ! -d "$APP_PATH" ]; then
            echo "Built app not found at: $APP_PATH" >&2
            exit 1
          fi

          xcrun simctl shutdown "$SIM_UDID" || true
          xcrun simctl erase "$SIM_UDID"
          xcrun simctl boot "$SIM_UDID"
          xcrun simctl bootstatus "$SIM_UDID" -b

          xcrun simctl install "$SIM_UDID" "$APP_PATH"

          mkdir -p build/screenshots

          xcrun simctl launch "$SIM_UDID" "$APP_BUNDLE_ID"
          sleep 4
          xcrun simctl io "$SIM_UDID" screenshot "build/screenshots/01-login.png"

          xcrun simctl terminate "$SIM_UDID" "$APP_BUNDLE_ID" || true
          xcrun simctl launch "$SIM_UDID" "$APP_BUNDLE_ID" --screenshot-home
          sleep 4
          xcrun simctl io "$SIM_UDID" screenshot "build/screenshots/02-home.png"

          xcrun simctl terminate "$SIM_UDID" "$APP_BUNDLE_ID" || true

      - name: Store screenshots in repo
        run: |
          set -euo pipefail
          mkdir -p ios/mZUTiOS/screenshots
          cp ios/mZUTiOS/build/screenshots/*.png ios/mZUTiOS/screenshots/

      - name: Upload screenshots artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-screenshots
          path: ios/mZUTiOS/screenshots/*.png

      - name: Upload xcodebuild logs artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-logs
          path: ios/mZUTiOS/build/*.log

      - name: Commit screenshots
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ios/mZUTiOS/screenshots/*.png
          if git diff --cached --quiet; then
            echo "No screenshot changes to commit"
            exit 0
          fi
          git commit -m "ci: refresh iOS simulator screenshots"
          git push
